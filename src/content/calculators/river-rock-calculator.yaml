    estimate: "~0.37 yd³ or ~0.54 tons | Cost: ~$40–$81 + delivery"
  - project: "Drainage Trench (30×2 ft, 6 inch depth)"
    description: "A French drain or drainage trench using 1-3 inch river rock for water flow."
    estimate: "~1.11 yd³ or ~1.50 tons | Cost: ~$112–$225 + delivery"
  - project: "Large Landscape Area (25×15 ft, 3 inch depth)"
    description: "Full ground cover for a front yard landscape area using 2 inch river rock."
    estimate: "~3.47 yd³ or ~4.86 tons | Cost: ~$365–$729 + delivery"

tips:
  - "Order 5–10% extra to account for gaps between irregularly shaped rocks and settling"
  - "River rock is sold by the ton at most landscape supply yards — a typical pickup truck carries about 1 ton"
  - "For drainage projects (French drains, swales), use larger 1-3 inch rock; for decorative ground cover, smaller 3/4 inch works well"
  - "Delivery fees typically range from $50–$150 depending on distance; ordering larger quantities may qualify for free delivery"
  - "Install landscape fabric under river rock to prevent weed growth and keep rocks from sinking into soil"
  - "Cost per ton ranges from $50–$150 depending on rock size, color, and region. Colored or specialty river rock costs more"
  - "For a polished look, use smaller 3/4 inch rock on top of larger 1-3 inch rock as a base layer"

faq:
  - question: "How much does a ton of river rock cover?"
    answer: "One ton of 1-3 inch river rock covers approximately 50 sq ft at 2-inch depth or 33 sq ft at 3-inch depth. Smaller 3/4 inch rock covers slightly more (~60 sq ft at 2 inches) because it packs tighter. Coverage decreases with larger rock sizes and greater depths."
  - question: "How much does river rock cost per ton?"
    answer: "River rock costs $50–$150 per ton depending on rock size, color, and your location. Plain gray/brown river rock is typically $50–$80/ton. Specialty colors (white, red, rainbow) can cost $100–$150/ton. Delivery adds $50–$150 depending on distance."
  - question: "How much does river rock cost per cubic yard?"
    answer: "River rock costs approximately $70–$200 per cubic yard depending on rock type and region. Since most suppliers sell by the ton, expect to pay $70–$135 per cubic yard for standard river rock (1.35–1.45 tons per cubic yard × $50–$100/ton)."
  - question: "How do I calculate how much river rock I need?"
    answer: "Measure your area's length and width in feet and desired depth in inches. Calculate cubic yards: (Length × Width × Depth ÷ 12) ÷ 27. Then multiply by density (1.35–1.45 tons/yd³) to get tons. Add 5–10% extra for gaps and settling."
  - question: "How much does a yard of river rock weigh?"
    answer: "One cubic yard of river rock weighs approximately 2,700–2,900 pounds (1.35–1.45 tons), depending on the rock size. Smaller rock is denser: 3/4 inch ≈ 2,900 lbs/yd³, 2 inch ≈ 2,800 lbs/yd³, 1-3 inch ≈ 2,700 lbs/yd³."
  - question: "How much does river rock delivery cost?"
    answer: "River rock delivery typically costs $50–$150 depending on distance from the supplier. Some suppliers offer free delivery for orders over 5–10 tons. Most delivery trucks can carry 10–20 tons, so ordering in bulk reduces the per-ton delivery cost."
  - question: "What size river rock should I use?"
    answer: "Use 3/4 inch river rock for decorative ground cover and walkways (smoother surface). Use 1-3 inch river rock for drainage projects, French drains, and large landscape areas. Use 2-4 inch or larger rock for erosion control and dry creek beds."
  - question: "How much river rock do I need for a garden bed?"
    answer: "For a 10×5 ft garden bed at 3-inch depth: approximately 0.55 cubic yards or 0.75 tons of 1-3 inch river rock. At $75/ton plus $75 delivery, total cost is approximately $131. Add 10% extra for gaps and settling."
  - question: "River rock vs pea gravel — which should I use?"
    answer: "River rock is larger (3/4 to 3+ inch), rounded, and better for drainage and decorative accents. Pea gravel is smaller (3/8 inch), smoother, and better for walkways and play areas. River rock stays in place better; pea gravel can scatter more easily."
  - question: "Do I need landscape fabric under river rock?"
    answer: "Yes, landscape fabric is recommended under river rock. It prevents weeds, keeps rocks from sinking into the soil, and makes future maintenance easier. Use a heavy-duty woven or non-woven geotextile fabric, not thin plastic sheeting."

