    description: "A decorative garden bed border using 1-3 inch river rock for weed suppression and aesthetics."
    estimate: "~0.55 yd³ or ~0.75 tons | Cost: ~$56–$113 + delivery"
  - project: "Walkway (20×3 ft, 2 inch depth)"
