title: "River Rock Calculator"
h1: "River Rock Calculator"
description: "Calculate how much river rock you need in cubic yards, tons, or by coverage area. Estimate costs per ton, per cubic yard, and for delivery."
category: "landscaping-calculators"
slug: "river-rock-calculator"
keywords:
  - "river rock calculator"
  - "river stone calculator"
  - "river rock coverage calculator"
  - "how much river rock do i need"
  - "river rock cubic yards"
  - "river rock tons"
  - "river rock cost per ton"
  - "river rock cost per cubic yard"
  - "river rock coverage per ton"
  - "river rock delivery cost"
  - "river rock for garden bed"
  - "river rock for walkway"
  - "river rock for drainage"
  - "1-3 river rock calculator"
  - "2 inch river rock calculator"
  - "3/4 river rock calculator"
  - "river rock weight per yard"
  - "calculate river rock coverage"

calculator:
  component: "RiverRockCalculator"
  inputs:
    - name: "length"
      label: "Length"
      unit: "ft"
      type: "number"
      placeholder: "20"
      required: true
    - name: "width"
      label: "Width"
      unit: "ft"
      type: "number"
      placeholder: "10"
      required: true
    - name: "depth"
      label: "Depth"
      unit: "in"
      type: "number"
      placeholder: "3"
      required: true
    - name: "rockSize"
      label: "Rock Size"
      unit: ""
      type: "select"
      options:
        - value: "1-3"
          label: "1-3 inch"
        - value: "2"
          label: "2 inch"
        - value: "3/4"
          label: "3/4 inch"
      required: true

formula:
  expression: "Cubic Yards = (Length × Width × Depth in ft) ÷ 27; Tons = Cubic Yards × Density; Cost = Tons × Price per Ton + Delivery"
  steps:
    - "1. Convert depth from inches to feet: Depth (ft) = Depth (in) ÷ 12"
    - "2. Calculate volume in cubic yards: Cubic Yards = (Length × Width × Depth) ÷ 27"
    - "3. Calculate tons using density: Tons = Cubic Yards × density (1-3 inch: 1.35; 2 inch: 1.40; 3/4 inch: 1.45 tons/yd³)"
    - "4. Calculate coverage: Coverage (sq ft/ton) = (27 ÷ depth in ft) ÷ density"
    - "5. Calculate weight: Weight (lbs) = Tons × 2000"
    - "6. Estimate cost: Cost = Tons × Price per Ton + Delivery Fee"

example:
  scenario: "covering a 20ft × 10ft garden bed with 3 inches of 1-3 inch river rock"
  values:
    length: 20
    width: 10
    depth: 3
    rockSize: "1-3"
  result: "You need approximately 1.85 cubic yards or 2.50 tons of 1-3 inch river rock. At $75/ton + $75 delivery, estimated total cost: $262.50. Coverage: approximately 80 sq ft per ton at 3-inch depth."

assumptions:
  - "River rock density varies by size: 1-3 inch ≈ 1.35 tons/yd³ (2,700 lbs/yd³), 2 inch ≈ 1.40 tons/yd³ (2,800 lbs/yd³), 3/4 inch ≈ 1.45 tons/yd³ (2,900 lbs/yd³)"
  - "Calculations assume loose, uncompacted rock — compaction may reduce volume by 5-10%"
  - "Cost estimates use national averages and may vary significantly by region and supplier"
  - "Delivery costs depend on distance from the supplier and order size"

showEstimateDisclaimer: true

referenceTable:
  title: "River Rock Coverage per Ton by Depth"
  headers:
    - "Rock Size"
    - "1 inch Depth"
    - "2 inch Depth"
    - "3 inch Depth"
    - "4 inch Depth"
  rows:
    - ["3/4 inch", "~120 sq ft", "~60 sq ft", "~40 sq ft", "~30 sq ft"]
    - ["1-3 inch", "~100 sq ft", "~50 sq ft", "~33 sq ft", "~25 sq ft"]
    - ["2 inch", "~90 sq ft", "~45 sq ft", "~30 sq ft", "~22 sq ft"]

