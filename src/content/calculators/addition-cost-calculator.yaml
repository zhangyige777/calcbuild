formula:
  expression: "Total Cost = Area (sq ft) × Cost per sq ft × Stories Factor × Room Multiplier × Region Multiplier; Adjusted for Foundation, Roof, HVAC, and Permits"
  steps:
    - "1. Calculate total floor area: Length × Width (× 2 for two stories)"
    - "2. Apply base cost rate: Standard $100–200/sq ft, Custom $200–350/sq ft"
    - "3. For two stories: first floor at base rate, second floor adds 20–30% premium for structural reinforcement and stairs"
    - "4. Apply room type multiplier: Bathroom +15%, Kitchen +20%, Garage -25%, Sunroom +10%, Master Suite +10%, In-Law Suite +5%"
    - "5. Apply region multiplier: Northeast ×1.25, Southeast ×0.90, Midwest ×0.90, West Coast ×1.30, Southwest ×0.95"
    - "6. Adjust foundation portion: Slab ×1.0, Crawl Space ×1.3, Basement ×2.0"
    - "7. Adjust roofing portion: Gable ×1.0, Hip ×1.15, Flat ×0.85, Shed ×0.90"
    - "8. Adjust HVAC portion: Extend ×1.0, New Unit ×1.5, None ×0"
    - "9. Add permit costs ($1,500–$5,000 based on area) if included"
    - "10. Add 10–20% contingency for unforeseen issues like soil problems, code upgrades, or hidden damage"
    - "11. Estimate timeline: 0.8–1.2 weeks per 100 sq ft (standard) or 1.2–1.8 weeks (custom)"

example:
  scenario: "estimating cost for a 12×24 ft single-story standard quality room addition"
  values:
    length: 12
    width: 24
    stories: "1"
    quality: "standard"
  result: "Total area: 288 sq ft. Low estimate: $28,800. Average estimate: $43,200. High estimate: $57,600. Add 10–20% contingency ($2,880–$11,520). Timeline: approximately 3–4 weeks."

assumptions:
  - "Cost per square foot ranges are based on 2024–2025 national averages for the United States"
  - "Standard quality uses builder-grade materials; custom quality uses premium materials and finishes"
  - "Second story costs 20–30% more per square foot due to structural reinforcement and stair requirements"
  - "Costs do not include land acquisition, site preparation beyond standard foundation work, or landscaping"
  - "Regional costs vary significantly: major metro areas can be 30–50% higher than national averages"
  - "All estimates are for planning purposes only and not a substitute for contractor quotes"

showEstimateDisclaimer: true

