intro: "Whether you're building a garden bed, laying a gravel path, or leveling your yard with topsoil, our landscaping calculators help you order the right amount of material — no more, no less. Each tool accounts for material density, coverage depth, and optional cost estimation."
howToChoose:
  - "For decorative ground cover, use the River Rock or Pea Gravel calculators — they calculate cubic yards, tons, and cost based on your area and desired depth."
  - "Need to level or fill an area? The Topsoil and Loam calculators help you determine how many cubic yards to order."
  - "Planning a new lawn? Start with the Sod Calculator to estimate square footage, then use the Sod Cost Calculator to budget for materials and delivery."
  - "Building a pond? The Pond Volume Calculator determines water capacity in gallons based on your pond's shape and dimensions."
scenarios:
  - title: "Building a Garden Bed with River Rock"
    description: "A homeowner calculates how many tons of river rock to order for a 10×5 ft garden bed at 3-inch depth, plus delivery costs from the local supplier."
  - title: "Installing a Gravel Pathway"
    description: "A DIYer uses the pea gravel calculator to determine cubic yards needed for a 30×3 ft pathway, then checks the cost calculator for budget planning."
  - title: "Leveling a Yard with Topsoil"
    description: "A homeowner measures low spots in the yard and uses the topsoil calculator to figure out how many cubic yards of soil to order from the landscape supply company."
  - title: "Estimating Landscape Project Costs"
    description: "A property owner planning a full front-yard makeover uses the landscape cost calculator to estimate the total budget across multiple material types."

